<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册系统</title>
    <style>
        /* 保持原有漂亮UI */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .step-container { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); max-width: 400px; width: 100%; transition: all 0.3s ease; }
        .hidden { display: none !important; }
        .form-header { text-align: center; margin-bottom: 25px; }
        .form-header h2 { color: #2c3e50; margin: 0 0 10px 0; font-size: 24px; font-weight: 600; }
        .form-header p { color: #7f8c8d; margin: 0; font-size: 14px; }
        
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; color: #2c3e50; font-weight: 500; font-size: 14px; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid #e1e8ed; border-radius: 8px; font-size: 16px; transition: border-color 0.3s ease; box-sizing: border-box; }
        .input-group input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1); }
        .input-group input[readonly] { background-color: #f8f9fa; color: #6c757d; cursor: not-allowed; }

        /* 密码小眼睛 */
        .toggle-password {
            position: absolute; right: 12px; top: 42px; background: none; border: none;
            color: #7f8c8d; font-size: 18px; cursor: pointer; padding: 4px; z-index: 10;
        }
        .toggle-password:hover { color: #2c3e50; }

        .primary-btn { padding: 14px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; width: 100%; background: linear-gradient(135deg, #3498db, #2980b9); color: white; margin-top: 10px; }
        .primary-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }
        .primary-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .message { margin-top: 15px; padding: 12px; border-radius: 6px; font-size: 14px; text-align: center; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <!-- 步骤1：验证手机号 (查Worker) -->
    <div id="step1" class="step-container">
        <div class="form-header">
            <h2>📱 资格验证</h2>
            <p>请输入手机号查询注册资格</p>
        </div>
        <div class="input-group">
            <label>手机号码</label>
            <input type="tel" id="phone" placeholder="例: 0123456789" maxlength="11">
        </div>
        <button id="checkBtn" class="primary-btn" onclick="verifyPhone()">验证资格</button>
        <div id="msg1" class="message"></div>
    </div>

    <!-- 步骤2：填写注册资料 (存GAS) -->
    <div id="step2" class="step-container hidden">
        <div class="form-header">
            <h2>📝 填写资料</h2>
            <p>验证通过，请完善账户信息</p>
        </div>
        
        <!-- 锁定的手机号 -->
        <div class="input-group">
            <label>手机号码</label>
            <input type="text" id="lockedPhone" readonly>
        </div>

        <!-- 姓名 (手动填) -->
        <div class="input-group">
            <label>用户姓名</label>
            <input type="text" id="name" placeholder="请输入您的真实姓名">
        </div>

        <!-- 密码 -->
        <div class="input-group">
            <label>设置密码</label>
            <input type="password" id="password" placeholder="请输入密码">
            <button type="button" class="toggle-password" onclick="togglePass('password')">👁️</button>
        </div>

        <!-- 确认密码 -->
        <div class="input-group">
            <label>确认密码</label>
            <input type="password" id="confirmPassword" placeholder="再次输入密码">
            <button type="button" class="toggle-password" onclick="togglePass('confirmPassword')">👁️</button>
        </div>

        <button id="submitBtn" class="primary-btn" onclick="submitRegister()">完成注册</button>
        <div id="msg2" class="message"></div>
    </div>

    <script>
        // --- 配置区域 ---
        
        // 1. 验证路径 (User-Center 的 Worker 列表)
        const VALIDATION_URLS = [
            "https://form.gealarm2012.workers.dev/admin-qifu?search=", 
            "https://form.gealarm2012.workers.dev/admin-chaodu?search=", 
            "https://lucky-cloud-f9c3.gealarm2012.workers.dev?search="
        ];

        // 2. 保存路径 (你的 GAS 代理)
        const GAS_URL = 'https://reg.gealarm2012.workers.dev'; 

        // --- 逻辑区域 ---

        // 切换密码显示
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // 1. 验证手机号 (轮询 Worker)
        async function verifyPhone() {
            const phoneInput = document.getElementById('phone');
            const phone = phoneInput.value.trim();
            const btn = document.getElementById('checkBtn');
            const msg = document.getElementById('msg1');

            // 简单格式验证
            const malaysiaPhoneRegex = /^01[0-9]{8,9}$/;
            if (!malaysiaPhoneRegex.test(phone)) {
                msg.textContent = '请输入正确的马来西亚手机号';
                msg.className = 'message error';
                return;
            }

            // UI 状态
            btn.disabled = true;
            btn.textContent = '查询中...';
            msg.textContent = '';

            let found = false;

            // 遍历所有链接进行查询
            for (const url of VALIDATION_URLS) {
                try {
                    const response = await fetch(url + phone);
                    if (response.ok) {
                        const data = await response.json();
                        // 只要返回了数据（假设非空即为找到），就算验证通过
                        if (data && (data.name || data.length > 0 || data.exists)) {
                            found = true;
                            break; // 找到了就停止循环
                        }
                    }
                } catch (err) {
                    console.warn('查询失败:', url, err);
                    // 继续尝试下一个
                }
            }

            if (found) {
                // 验证成功，进入第二步
                document.getElementById('lockedPhone').value = phone;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else {
                // 验证失败
                msg.textContent = '未找到该手机号的记录，请联系管理员确认资格';
                msg.className = 'message error';
                btn.disabled = false;
                btn.textContent = '验证资格';
            }
        }

async function submitRegister() {
    // ... (获取输入框代码) ...

    // 1. 基础验证
    if (!name) { /*...*/ return; }
    // ... (密码验证) ...

    btn.disabled = true;
    btn.textContent = '正在保存...';

    // 2. 直接发给 Worker (注意这里必须是 Worker 的地址)
    try {
        const formData = new FormData();
        formData.append('action', 'registerWithPassword');
        formData.append('phone', phone);
        formData.append('name', name);
        formData.append('password', password);

        // ⚠️ 注意：这里填你的 Worker 地址，不是 GAS 地址
        const WORKER_URL = 'https://reg.gealarm2012.workers.dev/'; 

        const response = await fetch(WORKER_URL, {
            method: 'POST',
            body: formData
        });

        const result = await response.json(); // 这里解析 JSON

        if (result.success) {
            // 成功跳转
            msg.textContent = '注册成功！';
            // ... (跳转逻辑) ...
        } else {
            // 失败提示 (这里会显示 "该手机号已被注册")
            msg.textContent = result.error || '注册失败';
            msg.className = 'message error';
            btn.disabled = false;
            btn.textContent = '完成注册';
        }

    } catch (err) {
        msg.textContent = '网络错误: ' + err.message;
        msg.className = 'message error';
        btn.disabled = false;
        btn.textContent = '完成注册';
    }
}
    </script>
</body>
</html>
