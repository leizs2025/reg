<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水子灵查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .search-container {
            padding: 20px;
            background: #f8f9fa;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .results-container {
            padding: 20px;
        }

        .result-item {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .result-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .water-soul-id {
            font-size: 1.1em;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .water-soul-name {
            font-size: 1em;
            color: #333;
            font-weight: 500;
        }

        .water-soul-name-empty {
            font-size: 0.9em;
            color: #6c757d;
            font-style: italic;
        }

        .no-results {
            text-align: center;
            color: #6c757d;
            padding: 40px 20px;
            font-size: 1.1em;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 20px;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 480px) {
            .header {
                padding: 20px 15px;
            }
            
            .header h1 {
                font-size: 1.3em;
            }
            
            .search-input {
                padding: 12px 15px;
                font-size: 16px;
            }
            
            .search-btn {
                padding: 12px;
                font-size: 16px;
            }
            
            .result-item {
                padding: 12px;
            }
        }

        .footer {
            text-align: center;
            color: #6c757d;
            padding: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>水子灵查询系统</h1>
            <p>请输入姓名或电话号码后6位进行查询</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="输入姓名或电话号码后6位..." autocomplete="off">
            <button id="searchBtn" class="search-btn">开始查询</button>
        </div>

        <div id="errorDiv" class="error" style="display: none;"></div>
        <div id="resultsContainer" class="results-container"></div>
        <div id="loadingDiv" class="loading" style="display: none;">
            <p>正在查询中...</p>
        </div>

        <div class="footer">
            <p>支持查询字段：親屬 1 中文姓名、聯絡電話 1、親屬 2 中文姓名、聯絡電話 2、功德主 中文姓名、聯絡電話 3</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsContainer = document.getElementById('resultsContainer');
            const loadingDiv = document.getElementById('loadingDiv');
            const errorDiv = document.getElementById('errorDiv');

            // 获取当前脚本URL（包含部署ID）
            const scriptUrl = 'https://script.google.com/macros/s/AKfycbxiameplOlAgrjhCGvh5WaOJm6VqMitGbP5_X2qt7p44TCRudVcF9oo2_EqpGlGuBM/exec';

            // 搜索功能
            async function searchWaterSouls(query) {
                if (!query.trim()) {
                    showError('请输入查询条件');
                    return;
                }

                showLoading(true);
                hideError();

                try {
                    const response = await fetch(`https://script.google.com/macros/s/AKfycbxojh7q2F9Tmtv1zs2GMXp8sSVDaWy2oxK14ynke7BNDL54PVlAfDMO7A_8tZbAMfM/exec?q=${encodeURIComponent(query)}`);
                    const data = await response.json();

                    if (data.error) {
                        showError(data.error);
                    } else {
                        displayResults(data);
                    }
                } catch (error) {
                    console.error('查询失败:', error);
                    showError('查询失败，请稍后重试');
                } finally {
                    showLoading(false);
                }
            }

            function displayResults(results) {
                if (!results || results.length === 0) {
                    resultsContainer.innerHTML = `
                        <div class="no-results">
                            <p>未找到匹配的水子灵记录</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                results.forEach(result => {
                    const waterSoulName = result['水子灵姓名'];
                    let nameDisplay = '';
                    
                    if (waterSoulName) {
                        nameDisplay = `<div class="water-soul-name">${waterSoulName}</div>`;
                    } else {
                        nameDisplay = `<div class="water-soul-name-empty">水子灵姓名：暂无</div>`;
                    }
                    
                    html += `
                        <div class="result-item">
                            <div class="water-soul-id">水子灵编號: ${result['水子灵编號']}</div>
                            ${nameDisplay}
                        </div>
                    `;
                });

                resultsContainer.innerHTML = html;
            }

            function showLoading(show) {
                loadingDiv.style.display = show ? 'block' : 'none';
            }

            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }

            function hideError() {
                errorDiv.style.display = 'none';
            }

            // 事件监听器
            searchBtn.addEventListener('click', () => {
                const query = searchInput.value.trim();
                searchWaterSouls(query);
            });

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const query = searchInput.value.trim();
                    searchWaterSouls(query);
                }
            });

            // 页面加载时自动聚焦到输入框
            searchInput.focus();
        });
    </script>
</body>
</html>
