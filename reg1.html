<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 表单容器 */
        .step-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            margin: 20px auto;
            transition: all 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        /* 表单头部 */
        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-header h2 {
            color: #2c3e50;
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
        }

        .form-header p {
            color: #7f8c8d;
            margin: 0;
            font-size: 14px;
        }

        .highlight {
            color: #3498db;
            font-weight: 600;
        }

        /* 输入组 */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        /* 按钮样式 */
        .primary-btn, .secondary-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .primary-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            margin-top: 10px;
        }

        .primary-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #2980b9, #2573a7);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .secondary-btn {
            background: #ecf0f1;
            color: #7f8c8d;
            margin-right: 10px;
        }

        .secondary-btn:hover:not(:disabled) {
            background: #d5dbdb;
            transform: translateY(-1px);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .primary-btn:disabled, .secondary-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* 加载图标 */
        .loading-icon {
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 消息样式 */
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .step-container {
                margin: 10px;
                padding: 20px;
            }
            
            .form-header h2 {
                font-size: 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .secondary-btn {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 步骤1：手机号验证 -->
    <div id="step1" class="step-container">
        <div class="form-header">
            <h2>📱 用户注册</h2>
            <p>请输入您的手机号进行验证</p>
        </div>
        
        <div class="input-group">
            <label for="phone">手机号码</label>
            <input type="tel" id="phone" placeholder="例: 0123456789" maxlength="11">
        </div>
        
        <button id="checkBtn" class="primary-btn" onclick="checkPhone()">验证手机号</button>
        
        <div id="message1" class="message"></div>
    </div>

    <!-- 步骤2：密码设置 -->
    <div id="step2" class="step-container hidden">
        <div class="form-header">
            <h2>🔐 设置密码</h2>
            <p>欢迎 <span id="userName" class="highlight">用户</span> (<span id="currentPhone"></span>)</p>
        </div>
        
        <div class="input-group">
            <label for="password">设置密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        
        <div class="input-group">
            <label for="confirmPassword">确认密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入密码">
        </div>
        
        <div class="button-group">
            <button class="secondary-btn" onclick="goBack()">返回</button>
            <button id="registerBtn" class="primary-btn" onclick="registerUser()">完成注册</button>
        </div>
        
        <div id="message2" class="message"></div>
    </div>

    <script>
        // 配置：Cloudflare Worker 代理URL
        const WORKER_PROXY_URL = 'https://reg.gealarm2012.workers.dev'; // 替换为您的Worker URL

        // 验证马来西亚手机号
        function isValidMalaysiaPhone(phone) {
            // 马来西亚手机号格式：以0开头，总共10-11位数字
            const malaysiaPhoneRegex = /^01[0-9]{8,9}$/;
            return malaysiaPhoneRegex.test(phone);
        }

        // 通过Worker代理发送请求
        async function sendToWorker(action, data) {
            try {
                const response = await fetch(WORKER_PROXY_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: action,
                        data: data
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                return result;
            } catch (error) {
                console.error('Worker请求错误:', error);
                throw error;
            }
        }

// 验证手机号
async function checkPhone() {
    const phoneInput = document.getElementById('phone');
    const phone = phoneInput.value.trim();
    const checkBtn = document.getElementById('checkBtn');
    
    if (!phone) {
        showMessage('请输入手机号', 'error', 1);
        return;
    }
    
    // 验证马来西亚手机号格式
    if (!isValidMalaysiaPhone(phone)) {
        showMessage('请输入正确的马来西亚手机号格式 (例: 0123456789 或 01234567890)', 'error', 1);
        return;
    }
    
    // 禁用按钮并显示加载状态
    checkBtn.disabled = true;
    checkBtn.innerHTML = '<i class="loading-icon">⏳</i> 验证中...';
    
    try {
        const result = await sendToWorker('checkPhoneNumber', { phone: phone });
        
        if (result.success) {
            // 手机号存在且未注册，显示第二步
            document.getElementById('currentPhone').textContent = phone;
            if (result.name) {
                document.getElementById('userName').textContent = result.name;
            }
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            showMessage('手机号验证通过，请设置密码', 'success', 1);
        } else {
            // 手机号不存在或已注册
            showMessage(result.error || '验证失败', 'error', 1);
        }
    } catch (error) {
        showMessage('验证失败: ' + error.message, 'error', 1);
    } finally {
        checkBtn.disabled = false;
        checkBtn.innerHTML = '验证手机号';
    }
}

        // 完成注册
        async function registerUser() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            
            if (!password || !confirmPassword) {
                showMessage('请填写完整密码信息', 'error', 2);
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error', 2);
                return;
            }
            
            // 禁用按钮并显示加载状态
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="loading-icon">⏳</i> 注册中...';
            
            try {
                const result = await sendToWorker('registerWithPassword', { 
                    phone: phone, 
                    password: password 
                });
                
                if (result.success) {
                    showMessage('注册成功！', 'success', 2);
                    // 清空密码字段
                    document.getElementById('password').value = '';
                    document.getElementById('confirmPassword').value = '';
                    
                    // 3秒后自动回到第一步
                    setTimeout(function() {
                        document.getElementById('step2').classList.add('hidden');
                        document.getElementById('step1').classList.remove('hidden');
                        document.getElementById('phone').value = '';
                        alert('注册成功！您可以使用手机号和密码登录了。');
                    }, 3000);
                } else {
                    showMessage(result.error || '注册失败', 'error', 2);
                }
            } catch (error) {
                showMessage('注册失败: ' + error.message, 'error', 2);
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '完成注册';
            }
        }

        // 返回上一步
        function goBack() {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('password').value = '';
            document.getElementById('confirmPassword').value = '';
            showMessage('', '', 2); // 清空消息
        }

        // 显示消息
        function showMessage(message, type, step) {
            const messageId = 'message' + step;
            const messageDiv = document.getElementById(messageId);
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`; // 'error' 或 'success'
        }

        // 回车键支持
        document.addEventListener('DOMContentLoaded', function() {
            const phoneInput = document.getElementById('phone');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');

            phoneInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkPhone();
                }
            });

            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    registerUser();
                }
            });

            confirmPasswordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    registerUser();
                }
            });
        });
    </script>
</body>
</html>
