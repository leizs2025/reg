<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo {
            margin-bottom: 25px;
        }

        .logo h1 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .logo p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .login-btn, .register-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 10px;
        }

        .login-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .login-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #2980b9, #2573a7);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .register-btn {
            background: transparent;
            color: #3498db;
            border: 2px solid #3498db;
        }

        .register-btn:hover:not(:disabled) {
            background: rgba(52, 152, 219, 0.1);
            transform: translateY(-1px);
        }

        .btn-group {
            margin-top: 20px;
        }

        .login-btn:disabled, .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .loading-icon {
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .forgot-password {
            display: block;
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
            margin-top: 10px;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .welcome-message {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }

        .welcome-message h3 {
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .welcome-message p {
            color: #7f8c8d;
            font-size: 14px;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 10px;
                padding: 25px;
            }
            
            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔐 登录系统</h1>
            <p>请输入您的账号信息</p>
        </div>
        
        <div class="input-group">
            <label for="phone">手机号码</label>
            <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11">
        </div>
        
        <div class="input-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        
        <button id="loginBtn" class="login-btn" onclick="login()">登录</button>
        
        <a href="#" class="forgot-password" onclick="forgotPassword()">忘记密码？</a>
        

        
        <div id="message" class="message"></div>
        
        <div id="welcomeMessage" class="welcome-message" style="display: none;">
            <h3>🎉 欢迎回来！</h3>
            <p id="welcomeText"></p>
        </div>
    </div>

    <script>
        // 配置：Cloudflare Worker 代理URL
        const WORKER_PROXY_URL = 'https://reg.gealarm2012.workers.dev'; // 替换为您的Worker URL

        // 验证马来西亚手机号
        function isValidMalaysiaPhone(phone) {
            const malaysiaPhoneRegex = /^01[0-9]{8,9}$/;
            return malaysiaPhoneRegex.test(phone);
        }

      // 替换掉原来的 sendToWorker 函数
async function sendToWorker(action, data) {
  try {
    // 1. 创建 FormData 对象
    const formData = new FormData();
    
    // 2. 把 action 和 data 里的所有字段都加进去
    formData.append('action', action);
    for (let key in data) {
      formData.append(key, data[key]);
    }

    // 3. 发送 FormData 而不是 JSON
    const response = await fetch(WORKER_PROXY_URL, {
      method: 'POST',
      body: formData // 这里不要 headers，让浏览器自动设置 multipart/form-data
    });

    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    
    const result = await response.json();
    return result;
  } catch (error) {
    console.error('Worker请求错误:', error);
    throw error;
  }
}

// 登录功能 (修改版)
async function login() {
    const phoneInput = document.getElementById('phone');
    const passwordInput = document.getElementById('password');
    const phone = phoneInput.value.trim();
    const password = passwordInput.value.trim();
    const loginBtn = document.getElementById('loginBtn');

    if (!phone || !password) {
        showMessage('请输入手机号和密码', 'error');
        return;
    }
    if (!isValidMalaysiaPhone(phone)) {
        showMessage('请输入正确的马来西亚手机号格式 (例: 0123456789)', 'error');
        return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="loading-icon">⏳</i> 登录中...';

    try {
        const result = await sendToWorker('loginUser', { phone: phone, password: password });
        if (result.success) {
            // ✅ 修改点1：登录成功后，保存用户信息到 localStorage
            // 这样用户中心和报名页能读取到用户是谁
            const userInfo = {
                phone: phone,
                name: result.name,
                isLoggedIn: true
            };
            localStorage.setItem('userInfo', JSON.stringify(userInfo));

            // ✅ 修改点2：不再显示欢迎信息，而是提示并跳转
            showMessage('登录成功！正在跳转...', 'success');
            
            // 1秒后跳转到用户中心
            setTimeout(() => {
                window.location.href = 'user-center.html'; // 跳转到用户中心
            }, 1000);
            
} else {
  // 根据 code 显示不同提示
  if (result.code === 'USER_NOT_FOUND') {
    showMessage('错误：该手机号尚未注册，请先注册', 'error');
  } else if (result.code === 'INVALID_PASSWORD') {
    showMessage('错误：密码不正确，请重试', 'error');
  } else if (result.code === 'MISSING_CREDENTIALS') {
    showMessage('请输入手机号和密码', 'error');
  } else {
    showMessage('登录失败: ' + result.error, 'error');
  }
}
    } catch (error) {
        showMessage('登录失败: ' + error.message, 'error');
    } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '登录';
    }
}
        // 添加登录用户函数到GAS
        async function loginUser(rawPhone, password) {
            try {
                const result = await sendToWorker('loginUser', { 
                    phone: rawPhone, 
                    password: password 
                });
                return result;
            } catch (error) {
                console.error('登录用户时出错:', error);
                throw error;
            }
        }

        // 忘记密码功能
        function forgotPassword() {
            showMessage('请联系管理员重置密码', 'error');
            // 这里可以实现忘记密码的功能
        }

     

        // 显示消息
        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            
            // 3秒后自动清除消息
            setTimeout(() => {
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            }, 3000);
        }

        // 回车键支持
        document.addEventListener('DOMContentLoaded', function() {
            const phoneInput = document.getElementById('phone');
            const passwordInput = document.getElementById('password');

            phoneInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    passwordInput.focus();
                }
            });

            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    login();
                }
            });
        });
    </script>
</body>
</html>
