        /* === 修复"出轨"问题的关键CSS === */

<body>

    <!-- 顶部标题 -->
    <h3 class="page-header">🙏 太岁光明灯查询/修改/新增报名</h3>

    <!-- 搜索与操作区 - 移除"开始登记"按钮 -->
    <div class="card">
        <div class="mb-3">
            <input type="text" id="searchInput" class="form-control mb-2" placeholder="输入手机号查询资料" inputmode="tel">

    <!-- 登记表单区域 -->
    <div id="adminForm" class="hidden">
        
        <!-- 基本信息 -->
        <div class="card">
            <h6 class="border-bottom pb-2 mb-3">📝 基本信息</h6>
            
            <!-- 新增：年份选择器 -->
            <div class="year-selector mb-3">
                <label class="form-label required-field">📅 报名太岁年份</label>
                <select id="registrationYear" class="form-select" onchange="updatePhoneWithYearPrefix()">
                    <option value="">-- 请选择年份 --</option> <!-- 初始为空 -->
                    <!-- JS 动态生成年份选项 -->
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label required-field">主祈者姓名</label>
                <input type="text" id="mainName" class="form-control" placeholder="姓名">
            </div>
            <div class="mb-3">
                <label class="form-label required-field">手机号码</label>
                <input type="tel" id="phoneNumber" class="form-control" placeholder="用于查询" inputmode="tel" readonly>
            </div>
        </div>

        <!-- 祈福者列表 -->
        <div class="card">
            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                <h6 class="m-0 prayers-title">🙏 祈福者名单</h6>
            </div>
            <div id="prayersContainer">
                <!-- JS 动态生成 -->
            </div>
        </div>

        <!-- 底部保存按钮 -->
        <div class="d-grid gap-2 mb-5">
            <button onclick="saveChanges()" class="btn btn-danger btn-lg">💾 保存资料</button>
            <button onclick="cancelEdit()" class="btn btn-secondary">取消</button>
        </div>
    </div>

    <!-- 价格汇总卡片 -->
    <div id="priceSummary" class="price-summary hidden">
        <div class="price-item">
            <span>纸金费用:</span>
            <span id="paperGoldAmount">0份 (0元)</span>
        </div>
        <div class="price-item">
            <span>安奉功德金:</span>
            <span id="donationAmount">0元</span>
        </div>
        <div class="total-price">
            <span>总计:</span>
            <span id="totalAmount">0元</span>
        </div>
    </div>

    <!-- === JS 逻辑 === -->
    <script>



        // ⚠️ 请在这里替换你的 Cloudflare Worker 地址
        const SAVE_API_URL = "https://userts.gealarm2012.workers.dev/";
		const SEARCH_API_URL = "https://lucky-cloud-f9c3.gealarm2012.workers.dev";
		
        let fullData = [];
        let selectedEntry = null;

        // 获取当前年份
        const currentYear = new Date().getFullYear();

        // 初始化年份选择器
        function initYearSelector() {
            const yearSelect = document.getElementById("registrationYear");
            // 保留默认的"请选择年份"选项
            yearSelect.innerHTML = '<option value="">-- 请选择年份 --</option>';
            
            // 生成从今年开始往后10年的选项
            for (let year = currentYear; year <= currentYear + 10; year++) {
                const option = document.createElement("option");
                option.value = year;
                option.textContent = year + "年";
                yearSelect.appendChild(option);
            }
        }

        // 验证马来西亚手机号格式
        function isValidMalaysianPhone(phone) {
            if (!phone) return false;
            
            // 移除所有非数字字符
            const cleanPhone = phone.replace(/\D/g, '');
            
            // 马来西亚手机号格式：以0开头，总长度10-11位
            // 例如：0123456789 (10位) 或 01234567890 (11位)
            return /^0\d{9,10}$/.test(cleanPhone);
        }

// 修正后的提取真实手机号函数
function extractRealPhone(phoneWithPrefix) {
  if (!phoneWithPrefix) return phoneWithPrefix;
  
  // 如果长度是11位（1位年份前缀 + 10位手机号）或12位（1位年份前缀 + 11位手机号）
  // 且第一位是数字，则认为是年份前缀
  if ((phoneWithPrefix.length === 11 || phoneWithPrefix.length === 12) && /^[0-9]$/.test(phoneWithPrefix.charAt(0))) {
    const withoutPrefix = phoneWithPrefix.substring(1); // 去掉第一位前缀
    
    // 验证剩余部分是否符合马来西亚手机号格式
    if (isValidMalaysianPhone(withoutPrefix)) {
      return withoutPrefix;
    }
  }
  
  // 如果不符合前缀规则，但本身是有效手机号，直接返回
  if (isValidMalaysianPhone(phoneWithPrefix)) {
    return phoneWithPrefix;
  }
  
  return phoneWithPrefix;
}
        // 为手机号添加前缀（直接替换第一位数字）
        function addPhonePrefix(phone, year) {
            if (!phone || !year) return phone;
            
            const yearLastDigit = year % 10; // 获取年份最后一位数字
            const realPhone = extractRealPhone(phone); // 先清洗一次
            
            // 验证是否是有效的马来西亚手机号
            if (isValidMalaysianPhone(realPhone)) {
                return yearLastDigit + realPhone; // 添加前缀
            }
            
            return phone; // 如果不是有效手机号，返回原值
        }

  // 修正后的更新函数
function updatePhoneWithYearPrefix() {
  const phoneInput = document.getElementById("phoneNumber");
  const yearSelect = document.getElementById("registrationYear");
  const selectedYear = parseInt(yearSelect.value);
  
  if (!selectedYear || !phoneInput.value) return;
  
  const yearLastDigit = selectedYear % 10;
  let currentPhone = phoneInput.value;
  
  // 如果当前手机号已经是带年份前缀的格式（11位或12位）
  if ((currentPhone.length === 11 || currentPhone.length === 12) && /^[0-9]$/.test(currentPhone.charAt(0))) {
    // 提取真实手机号码（去掉年份前缀）
    const realPhone = currentPhone.substring(1);
    
    // 验证是否为有效的马来西亚手机号
    if (isValidMalaysianPhone(realPhone)) {
      // 是有效的马来西亚手机号，用新前缀替换旧前缀
      phoneInput.value = yearLastDigit + realPhone;
    } else {
      // 不是有效的手机号，按原逻辑处理
      phoneInput.value = yearLastDigit + currentPhone;
    }
  }
  // 如果是标准的马来西亚手机号格式（10位或11位），直接添加年份前缀
  else if ((currentPhone.length === 10 || currentPhone.length === 11) && 
           currentPhone.charAt(0) === '0' && 
           currentPhone.charAt(1) === '1') {
    // 添加年份前缀
    phoneInput.value = yearLastDigit + currentPhone;
  }
  // 其他情况按原逻辑处理
  else {
    phoneInput.value = yearLastDigit + currentPhone;
  }
}
        // 计算总价格
        function calculateTotalPrice() {
            let totalPaperGold = 0;
            let totalDonation = 0;
            
            const prayers = document.getElementById("prayersContainer").children;
            Array.from(prayers).forEach(div => {
                // 计算纸金总数（5种纸金相加）
                const pg1 = parseInt(div.querySelector(".pg1").value) || 0;
                const pg2 = parseInt(div.querySelector(".pg2").value) || 0;
                const pg3 = parseInt(div.querySelector(".pg3").value) || 0;
                const pg4 = parseInt(div.querySelector(".pg4").value) || 0;
                const pg5 = parseInt(div.querySelector(".pg5").value) || 0;
                
                totalPaperGold += pg1 + pg2 + pg3 + pg4 + pg5;
                
                // 计算安奉功德金
                const donation = parseInt(div.querySelector(".donate").value) || 0;
                totalDonation += donation;
            });
            
            // 计算纸金费用（3元/份）
            const paperGoldCost = totalPaperGold * 3;
            const total = paperGoldCost + totalDonation;
            
            // 更新显示 - 纸金费用现在显示份数和金额
            document.getElementById("paperGoldAmount").textContent = `${totalPaperGold}份 (${paperGoldCost}元)`;
            document.getElementById("donationAmount").textContent = totalDonation + "元";
            document.getElementById("totalAmount").textContent = total + "元";
            
            // 显示价格汇总卡片
            document.getElementById("priceSummary").classList.remove("hidden");
        }

        document.addEventListener("DOMContentLoaded", function() {
    initYearSelector(); // 原有的代码保留
    
    // === 以下是我们新加的代码 ===
    const userInfoStr = localStorage.getItem('userInfo');
    if (!userInfoStr) {
        alert('请先登录');
        window.location.href = 'login.html';
        return;
    }

    const userInfo = JSON.parse(userInfoStr);
    if (!userInfo.isLoggedIn) {
        alert('登录已过期');
        window.location.href = 'login.html';
        return;
    }

    // 锁定手机号输入框
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.value = userInfo.phone;
        searchInput.readOnly = true;
        searchInput.style.backgroundColor = '#e9ecef';
    }
    // === 新代码结束 ===
});

        // 锁定查询按钮
        function lockSearchButton() {
            const searchButton = document.getElementById("searchButton");
            searchButton.classList.add("locked-btn");
        }

        // 解锁查询按钮
        function unlockSearchButton() {
            const searchButton = document.getElementById("searchButton");
            searchButton.classList.remove("locked-btn");
        }

     // 1. 修改查询功能
window.searchPhone = function () {
    const keyword = document.getElementById("searchInput").value.trim();
    if (!keyword) return alert("请输入手机号！");

    // 验证手机号格式
    if (!isValidMalaysianPhone(keyword)) {
        alert("请输入有效的马来西亚手机号（以0开头，共10-11位数字）");
        return;
    }

    // 显示加载状态
    const btn = document.getElementById("searchButton");
    btn.innerHTML = "🔍 查询中...";
    btn.disabled = true;

    // 去掉查询关键词的前缀
    const realKeyword = extractRealPhone(keyword);

    // 使用专门的查询 Worker
    fetch(`${SEARCH_API_URL}?search=${encodeURIComponent(realKeyword)}`)
        .then(async response => {
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`查询请求失败: ${response.status} - ${errorText}`);
            }
            return response.text();
        })
        .then(text => {
            if (!text || text.trim() === '') {
                throw new Error("查询服务返回空响应");
            }
            
            let data;
            try { 
                data = JSON.parse(text); 
            } 
            catch (e) { 
                console.error("解析JSON错误:", e);
                console.log("响应内容:", text);
                throw new Error(`查询服务返回的数据格式错误: ${e.message}`);
            }

            fullData = data;
            const selector = document.getElementById("resultSelector");
            const infoDiv = document.getElementById("searchResultInfo");
            
            // 清空之前的选择器和提示信息
            selector.innerHTML = "";
            infoDiv.classList.add("hidden");

            if (data.length === 0) {
                // 查无资料，显示提示信息并提供继续按钮
                infoDiv.innerHTML = `
                    <div class="search-result-info">📱 未找到该手机号的资料，将为您创建新的报名表单</div>
                    <button class="btn continue-btn" onclick="startNewEntry('${realKeyword}')">✅ 立即填写报名表</button>
                `;
                infoDiv.classList.remove("hidden");
                
                // 锁定查询按钮
                lockSearchButton();
            }
            // 有资料的情况
            else if (data.length === 1) {
                // 单条记录，直接编辑
                infoDiv.innerHTML = `<div class="search-result-info">✅ 找到1笔资料，正在加载...</div>`;
                infoDiv.classList.remove("hidden");
                
                // 添加说明卡片
                const infoCard = document.createElement("div");
                infoCard.className = "info-card";
                infoCard.innerHTML = `
                    <h6>📋 资料说明</h6>
                    <ul>
                        <li>下方显示的是您之前报名的太岁光明灯资料</li>
                        <li>您可以直接编辑现有信息或添加新的祈福者</li>
                        <li>点击"保存资料"即可更新您的登记信息</li>
                    </ul>
                `;
                infoDiv.appendChild(infoCard);
                
                const newRecordBtn = document.createElement("button");
                newRecordBtn.className = "btn btn-success new-record-btn";
                newRecordBtn.textContent = "➕ 填写全新的报名表";
                newRecordBtn.onclick = () => {
                    startNewEntry(realKeyword); // 使用清洗后的手机号
                };
                infoDiv.appendChild(newRecordBtn);
                
                selectedEntry = data[0];
                setTimeout(() => {
                    renderForm();
                    
                    // 锁定查询按钮
                    lockSearchButton();
                }, 500); // 短暂延迟显示提示
            } 
            else {

// 修改检查手机是否存在冲突的函数
async function checkPhoneExists(phone, year) {
    try {
        console.log("检查手机号是否存在:", phone, "年份:", year);
        
        // 使用编码的参数构建URL
        const encodedPhone = encodeURIComponent(phone);
        const searchUrl = `${SAVE_API_URL}?search=${encodedPhone}`;
        
        console.log("查询URL:", searchUrl);
        
        // 发送GET请求
        const response = await fetch(searchUrl, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            mode: 'cors' // 明确指定CORS模式
        });
        
        console.log("查询响应状态:", response.status);
        
        if (!response.ok) {
            console.error(`查询错误: ${response.status} - ${response.statusText}`);
            const errorText = await response.text();
            console.error("错误详情:", errorText);
            throw new Error(`查询服务错误: ${response.status} - ${response.statusText}`);
        }
        
        let data;
        try {
            const responseText = await response.text();
            console.log("原始响应文本:", responseText);
            
            if (!responseText.trim()) {
                console.warn("响应为空，返回空数组");
                return false;
            }
            
            data = JSON.parse(responseText);
        } catch (parseError) {
            console.error("JSON解析错误:", parseError);
            console.error("响应内容:", responseText);
            throw new Error(`响应格式错误: ${parseError.message}`);
        }
        
        console.log("解析后的数据:", data);
        
        // 确保 data 是数组
        if (!Array.isArray(data)) {
            console.warn("返回的数据不是数组格式，返回false");
            return false;
        }
        
        // 检查数据库中是否存在相同年份前缀的记录
        const yearDigit = String(year % 10);
        const exists = data.some(record => {
            // 检查记录的手机号是否以相同的年份数字开头
            return record.phoneNumber && record.phoneNumber.startsWith(yearDigit);
        });
        
        console.log("是否存在冲突:", exists);
        return exists;
    } catch (error) {
        console.error("检查手机号冲突时出错:", error);
        // 发生错误时返回 false，避免阻塞正常流程
        return false;
    }
}
        // 6. 获取下一个可用的手机号（带前缀和后缀）
// 修改获取下一个可用手机号的函数，使用 SAVE_API_URL
async function getNextAvailablePhone(basePhone, year) {
    // 首先添加年份前缀
    const phoneWithPrefix = addPhonePrefix(basePhone, year);
    
    // 检查基本前缀号码是否存在冲突
    if (!(await checkPhoneExists(basePhone, year))) {
        // 如果基本号码没有冲突（去掉前缀的部分），直接返回带前缀的号码
        return phoneWithPrefix;
    }
    
    // 如果存在冲突，开始添加后缀
    let suffix = 1;
    while (suffix <= 100) { // 添加循环限制，防止无限循环
        const phoneWithSuffix = `${phoneWithPrefix}+${suffix}`;
        
        try {
            // 检查这个带后缀的号码是否在当前年份中存在冲突
            const response = await fetch(`${SAVE_API_URL}?search=${encodeURIComponent(extractRealPhone(phoneWithSuffix))}`);
            const data = await response.json();
            
            // 检查是否有一样的年份前缀
            const yearDigit = String(year % 10);
            
            // 检查数据库中是否存在相同的完整号码（包括后缀）
            const exists = data.some(record => {
                return record.phoneNumber === phoneWithSuffix;
            });
            
            if (!exists) {
                // 如果不存在冲突，返回这个带前缀和后缀的号码
                return phoneWithSuffix;
            }
            
            suffix++;
        } catch (error) {
            console.error("检查带后缀号码时出错:", error);
            throw error; // 重新抛出错误
        }
    }
    
    // 如果尝试了太多后缀仍未找到，抛出错误
    throw new Error("无法找到可用的手机号，可能已达最大后缀限制");
}

}	
		
		// 8. 取消编辑（返回首页）
        window.cancelEdit = function() {
            document.getElementById("adminForm").classList.add("hidden");
            document.getElementById("searchResultInfo").classList.add("hidden");
            document.getElementById("resultSelector").classList.add("hidden");
            
            // 隐藏价格汇总
            document.getElementById("priceSummary").classList.add("hidden");
            
            // 清空表单
            document.getElementById("mainName").value = "";
            document.getElementById("phoneNumber").value = "";
            document.getElementById("searchInput").value = "";
            
            // 重置全局变量
            selectedEntry = null;
            fullData = [];
            
            // 重置年份选择器为"请选择"
            const yearSelect = document.getElementById("registrationYear");
            yearSelect.value = "";
            
            // 解锁查询按钮
            unlockSearchButton();
        };

        // === 补全的辅助函数 ===

        // 生成单选框组 - 修改版本，确保水平排列
        function createRadioGroup(name, className, checkedVal, pgClass) {
            return `
              <div class="form-check d-flex align-items-center justify-content-center">
                <input class="form-check-input ${className}" type="radio" name="${name}" value="是" ${checkedVal === "是" ? "checked" : ""} onchange="togglePaperGold(this, '${pgClass}')">
                <label class="form-check-label ms-1" style="font-size: 14px; font-weight: 500;">是</label>
              </div>
              <div class="form-check d-flex align-items-center justify-content-center">
                <input class="form-check-input ${className}" type="radio" name="${name}" value="" ${!checkedVal ? "checked" : ""} onchange="togglePaperGold(this, '${pgClass}')">
                <label class="form-check-label ms-1" style="font-size: 14px; font-weight: 500;">否</label>
              </div>`;
        }

        // 控制纸金框的启用/禁用
        window.togglePaperGold = function(radioElement, pgClass) {
            const isYes = radioElement.value === "是";
            const parentDiv = radioElement.closest('.prayer-card');
            const pgInputs = parentDiv.querySelectorAll(`.${pgClass}`);
            
            pgInputs.forEach(input => {
                input.disabled = !isYes;
                if (isYes) {
                    input.classList.remove('pg-disabled');
                } else {
                    input.classList.add('pg-disabled');
                    input.value = ''; // 清空值
                }
            });
            
            // 重新计算价格
            setTimeout(calculateTotalPrice, 100);
        };

        // 检查最小数量（防止删光了）
        window.checkMin = function() {
             const container = document.getElementById("prayersContainer");
             if (container.children.length === 0) {
                 container.appendChild(createPrayerBlock({}, 1));
                 setTimeout(calculateTotalPrice, 100);
             }
             
             // 确保最后一个卡片有"新增一位"按钮
             setTimeout(updateAddButtonVisibility, 100);
        };

        // 生成生肖下拉选择
        function createZodiacSelect(selectedValue = "") {
            const zodiacs = [
                { value: "", label: "-- 请选择 --" },
                { value: "鼠", label: "🐭 鼠" },
                { value: "牛", label: "🐮 牛" },
                { value: "虎", label: "🐯 虎" },
                { value: "兔", label: "🐰 兔" },
                { value: "龙", label: "🐉 龙" },
                { value: "蛇", label: "🐍 蛇" },
                { value: "马", label: "🐎 马" },
                { value: "羊", label: "🐑 羊" },
                { value: "猴", label: "🐵 猴" },
                { value: "鸡", label: "🐔 鸡" },
                { value: "狗", label: "🐶 狗" },
                { value: "猪", label: "🐷 猪" }
            ];
            
            let options = "";
            zodiacs.forEach(z => {
                options += `<option value="${z.value}" ${selectedValue === z.value ? "selected" : ""}>${z.label}</option>`;
            });
            
            return `<select class="form-select pZodiac" style="height:35px" oninput="calculateTotalPrice()">
                ${options}
            </select>`;
        }

        // === 你提供的完整 createPrayerBlock 函数（已修改生肖为下拉选择）===
        function createPrayerBlock(data = {}, index = 1) {
            const div = document.createElement("div");
            div.className = "prayer-card"; // 使用自定义样式类

            // 确定初始状态
            const taiSuiChecked = data.taiSui === "是";
            const lightChecked = data.light === "是";
            const longevityChecked = data.longevity === "是";
            const wisdomChecked = data.wisdom === "是";
            const arhatChecked = data.arhat === "是";

            div.innerHTML = `
                <div class="remove-btn" onclick="this.parentElement.remove(); checkMin(); setTimeout(calculateTotalPrice, 100)">❌</div>
                <div class="mb-2"><strong>🧍‍♂️ 第 ${index} 位祈福者</strong></div>

                <div class="row g-2">
                    <div class="col-6">姓名 <input value="${data.name || ''}" class="form-control pName" style="height:35px" oninput="calculateTotalPrice()"/></div>
                    <div class="col-6">生肖 ${createZodiacSelect(data.zodiac || '')}</div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-6">太岁 <div class="radio-group">${createRadioGroup(`pTaiSui${index}`, "pTaiSui", data.taiSui, "pg1")}</div></div>
                    <div class="col-6">纸金 <input type="number" value="${data.paperGold1 || ''}" class="form-control pg1" style="height:35px" oninput="calculateTotalPrice()" ${taiSuiChecked ? '' : 'disabled'} ${!taiSuiChecked ? 'class="form-control pg1 pg-disabled"' : ''}/></div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-6">光明灯 <div class="radio-group">${createRadioGroup(`pLight${index}`, "pLight", data.light, "pg2")}</div></div>
                    <div class="col-6">纸金 <input type="number" value="${data.paperGold2 || ''}" class="form-control pg2" style="height:35px" oninput="calculateTotalPrice()" ${lightChecked ? '' : 'disabled'} ${!lightChecked ? 'class="form-control pg2 pg-disabled"' : ''}/></div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-6">长生禄位<div class="radio-group">${createRadioGroup(`pLongevity${index}`, "pLongevity", data.longevity, "pg3")}</div></div>
                    <div class="col-6">纸金 <input type="number" value="${data.paperGold3 || ''}" class="form-control pg3" style="height:35px" oninput="calculateTotalPrice()" ${longevityChecked ? '' : 'disabled'} ${!longevityChecked ? 'class="form-control pg3 pg-disabled"' : ''}/></div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-6">文昌帝君 <div class="radio-group">${createRadioGroup(`pWisdom${index}`, "pWisdom", data.wisdom, "pg4")}</div></div>
                    <div class="col-6">纸金 <input type="number" value="${data.paperGold4 || ''}" class="form-control pg4" style="height:35px" oninput="calculateTotalPrice()" ${wisdomChecked ? '' : 'disabled'} ${!wisdomChecked ? 'class="form-control pg4 pg-disabled"' : ''}/></div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-6">十八罗汉 <div class="radio-group">${createRadioGroup(`pArhat${index}`, "pArhat", data.arhat, "pg5")}</div></div>
                    <div class="col-6">纸金 <input type="number" value="${data.paperGold5 || ''}" class="form-control pg5" style="height:35px" oninput="calculateTotalPrice()" ${arhatChecked ? '' : 'disabled'} ${!arhatChecked ? 'class="form-control pg5 pg-disabled"' : ''}/></div>
                </div>

                <div class="row g-2 mt-2">
                    <div class="col-12">安奉功德金 <input type="number" value="${data.donation || ''}" class="form-control donate" style="height:35px" oninput="calculateTotalPrice()"/></div>
                </div>
            `;

            // 为每个输入框添加初始状态
            setTimeout(() => {
                const card = div;
                
                // 初始化太岁纸金框
                const taiSuiYes = card.querySelector(`input[name="pTaiSui${index}"][value="是"]`);
                if (taiSuiYes && taiSuiYes.checked) {
                    togglePaperGold(taiSuiYes, 'pg1');
                }
                
                // 初始化光明灯纸金框
                const lightYes = card.querySelector(`input[name="pLight${index}"][value="是"]`);
                if (lightYes && lightYes.checked) {
                    togglePaperGold(lightYes, 'pg2');
                }
                
                // 初始化长生禄纸金框
                const longevityYes = card.querySelector(`input[name="pLongevity${index}"][value="是"]`);
                if (longevityYes && longevityYes.checked) {
                    togglePaperGold(longevityYes, 'pg3');
                }
                
                // 初始化文昌纸金框
                const wisdomYes = card.querySelector(`input[name="pWisdom${index}"][value="是"]`);
                if (wisdomYes && wisdomYes.checked) {
                    togglePaperGold(wisdomYes, 'pg4');
                }
                
                // 初始化十六罗汉纸金框
                const arhatYes = card.querySelector(`input[name="pArhat${index}"][value="是"]`);
                if (arhatYes && arhatYes.checked) {
                    togglePaperGold(arhatYes, 'pg5');
                }
            }, 10);

            return div;
        }
    </script>
